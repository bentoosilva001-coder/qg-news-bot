name: Robo QG NEWS 🤖

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-portal:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Acessando o cofre do projeto
        uses: actions/checkout@v4

      - name: 🐍 Preparando o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalando ferramentas de conexao
        run: pip install requests

      - name: 🕵️‍♂️ Executando varredura global de noticias
        env:
          CHAVE_API_NOTICIAS: ${{ secrets.CHAVE_API_NOTICIAS }}
        run: python noticias.py

      - name: 💾 Salvando novas manchetes no portal
        run: |
          git config --global user.name "Robo QG NEWS"
          git config --global user.email "robo@qgnews.com"
          git add dados.json
          git commit -m "⚡ Atualizacao automatica: Novas manchetes capturadas!" || echo "Sem mudancas."
          git push
